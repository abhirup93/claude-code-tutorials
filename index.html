<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abhirup Pal — Data & AI Architect</title>
  <script src="https://platform.linkedin.com/badges/js/profile.js" async defer type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f2ef;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.4rem; color: #1a1a1a; margin-bottom: 0.3rem; }
    p.role { color: #555; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .badge-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; }
    .links a {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .btn-li { background: #0A66C2; color: white; }
    .btn-md { background: #000; color: white; }
    .btn-li:hover { background: #004182; }
    .btn-md:hover { background: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Abhirup Pal</h1>
    <p class="role">Data & AI Architect | I share knowledge on Data & AI</p>

    <!-- LinkedIn Dark Badge -->
    <div class="badge-wrap">
      <div class="badge-base LI-profile-badge"
           data-locale="en_US"
           data-size="medium"
           data-theme="dark"
           data-type="VERTICAL"
           data-vanity="abhirup-pal-776066a1"
           data-version="v1">
      </div>
    </div>

    <div class="links">
      <a class="btn-li" href="https://linkedin.com/in/abhirup-pal-776066a1" target="_blank">🔗 Connect on LinkedIn</a>
      <a class="btn-md" href="https://medium.com/@abhirup.pal93" target="_blank">✍️ Read on Medium</a>
    </div>
  </div>
</body>
</html>
